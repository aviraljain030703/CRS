version: "3.9"

services:
  # ── MySQL Database ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cms_db
      MYSQL_USER: cms_user
      MYSQL_PASSWORD: cms_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Application ──────────────────────────────────────────────
  app:
    build: .
    container_name: cms_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: mysql+pymysql://cms_user:cms_pass@db:3306/cms_db
      SECRET_KEY: change-me-in-production-super-long-secret
      JWT_SECRET_KEY: change-me-jwt-secret-super-long
      SEED_DB: "true"
      PORT: "5000"
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/app/static/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/meta"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  uploads_data:
