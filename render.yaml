services:
  - type: web
    name: campus-grievance-hub
    runtime: python
    rootDir: flask-app
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 4 wsgi:application"
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    preDeployCommand: "python -c 'from app import create_app, db; app = create_app(\"production\"); app.app_context().push(); db.create_all()'"
    healthCheckPath: /api/meta
    disk:
      name: uploads
      mountPath: /app/app/static/uploads
      sizeGB: 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_DEBUG
        value: false
      - key: SEED_DB
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        value: https://yourdomain.com
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CMS_DATABASE_URL
        sync: false
